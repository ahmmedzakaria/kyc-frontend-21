<div class="profile-container container mt-4">
    <h2 class="mb-3">User Profile</h2>

    <div class="card shadow-sm p-4">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <div class="photo-wrapper mb-3">
                    <img
                            [src]="userPhotoPreview || 'assets/default-avatar.svg'"
                            class="rounded-circle profile-photo"
                            alt="User Photo"
                    />
                </div>

                <div *ngIf="isEditing">
                    <input type="file" (change)="onFileSelected($event)" class="form-control" />
                </div>
            </div>

            <div class="col-md-8">
                <form [formGroup]="form" (ngSubmit)="saveProfile()">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" formControlName="name" [readonly]="!isEditing" />
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" formControlName="email" [readonly]="!isEditing" />
                    </div>

                    <div class="mb-3">
                        <label>Mobile</label>
                        <input type="text" class="form-control" formControlName="mobile" [readonly]="!isEditing" />
                    </div>

                    <div *ngIf="isEditing" class="mb-3">
                        <label>New Password</label>
                        <input type="password" class="form-control" formControlName="password" />
                    </div>

                    <div class="mt-3 text-end">
                        <button *ngIf="!isEditing" class="btn btn-primary" (click)="toggleEdit()" type="button">
                            <i class="fa fa-edit me-2"></i>Edit
                        </button>

                        <button *ngIf="isEditing" class="btn btn-success me-2" type="submit">
                            <i class="fa fa-save me-2"></i>Save
                        </button>
                        <button *ngIf="isEditing" class="btn btn-secondary" type="button" (click)="toggleEdit()">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
