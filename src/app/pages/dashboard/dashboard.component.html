<div class="dashboard container mt-4">
    <h2 class="mb-4">Dashboard</h2>

    <div class="row">
        <div class="col-md-3" *ngFor="let stat of stats">
            <div class="card shadow-sm text-center mb-3 dashboard-card">
                <div class="card-body">
                    <i class="fa {{ stat.icon }} fa-2x text-primary mb-2"></i>
                    <h5 class="card-title">{{ stat.title }}</h5>
                    <h3 class="card-text fw-bold">{{ stat.value }}</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a routerLink="/kyc" class="btn btn-outline-primary">
            <i class="fa fa-id-badge me-2"></i> Manage KYC
        </a>
    </div>
</div>
